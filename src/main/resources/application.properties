# ===========================
# APPLICATION
# ===========================
spring.application.name=workflow-back
server.port=8080

# ===========================
# MONGODB
# ===========================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/workflow_db}
spring.data.mongodb.database=workflow_db

# ===========================
# JWT
# ===========================
jwt.secret=${JWT_SECRET:workflow-secret-key-muy-largo-para-produccion-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===========================
# IA MICROSERVICE
# ===========================
ia.service.url=${IA_SERVICE_URL:http://localhost:8001}

# ===========================
# FIREBASE
# ===========================
firebase.credentials=${FIREBASE_CREDENTIALS:}

# ===========================
# AZURE BLOB STORAGE
# ===========================
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=adjuntos

# ===========================
# LOGGING
# ===========================
logging.level.com.workflow=DEBUG
logging.level.org.springframework.security=INFO