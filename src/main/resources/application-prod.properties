# Configuración de Producción para Azure
spring.data.mongodb.uri=${MONGODB_URI}

# IA Service
ia.service.url=${IA_SERVICE_URL}

# Seguridad y JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Firebase (usaremos la variable de entorno para el JSON en base64)
# firebase.credentials.path se manejara por sistema de archivos o env

# Ajustes de servidor
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Log level
logging.level.com.workflow=INFO
